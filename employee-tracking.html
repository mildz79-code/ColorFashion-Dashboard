<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OpsMaster — Employee Tracking</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:    #0d1117;
    --bg-surface: #161b22;
    --bg-card:    #1c2230;
    --bg-hover:   #222d3d;
    --border:     rgba(99,130,168,0.15);
    --border-hi:  rgba(99,130,168,0.3);
    --text-1:     #e6edf3;
    --text-2:     #8b949e;
    --text-3:     #484f58;
    --blue:       #388bfd;
    --blue-dim:   rgba(56,139,253,0.15);
    --teal:       #39d353;
    --teal-dim:   rgba(57,211,83,0.12);
    --amber:      #d29922;
    --amber-dim:  rgba(210,153,34,0.15);
    --red:        #f85149;
    --red-dim:    rgba(248,81,73,0.12);
    --purple:     #a371f7;
    --purple-dim: rgba(163,113,247,0.12);
    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  14px;
    --font:       'DM Sans', sans-serif;
    --mono:       'DM Mono', monospace;
  }

  body {
    background: var(--bg-base);
    color: var(--text-1);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    min-height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 200px;
    min-height: 100vh;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-logo {
    padding: 20px 18px 16px;
    font-size: 17px;
    font-weight: 600;
    color: var(--text-1);
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.3px;
  }
  .sidebar-nav { padding: 10px 0; flex: 1; }
  .nav-item {
    display: block;
    padding: 9px 18px;
    color: var(--text-2);
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { color: var(--text-1); background: var(--bg-hover); }
  .nav-item.active {
    color: var(--blue);
    background: var(--blue-dim);
    border-left-color: var(--blue);
    font-weight: 500;
  }

  /* ── Main content ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    background: var(--bg-surface);
  }
  .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--text-1); }
  .page-sub   { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  .topbar-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  .btn {
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-1);
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--border-hi); }
  .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .btn-primary:hover { background: #4a9fff; border-color: #4a9fff; }

  .content { padding: 20px 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 18px; }

  /* ── Cards ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .card-header {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text-1); }
  .card-body  { padding: 18px; }

  /* ── KPI grid ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-card.blue::before   { background: var(--blue); }
  .kpi-card.teal::before   { background: var(--teal); }
  .kpi-card.amber::before  { background: var(--amber); }
  .kpi-card.purple::before { background: var(--purple); }

  .kpi-label { font-size: 11px; font-weight: 500; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.6px; }
  .kpi-value { font-size: 28px; font-weight: 600; color: var(--text-1); margin: 6px 0 2px; letter-spacing: -1px; line-height: 1; }
  .kpi-sub   { font-size: 11px; color: var(--text-2); }
  .kpi-icon  {
    position: absolute; top: 14px; right: 16px;
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .kpi-icon.blue   { background: var(--blue-dim);   color: var(--blue); }
  .kpi-icon.teal   { background: var(--teal-dim);   color: var(--teal); }
  .kpi-icon.amber  { background: var(--amber-dim);  color: var(--amber); }
  .kpi-icon.purple { background: var(--purple-dim); color: var(--purple); }

  /* ── Two-col layout ── */
  .two-col { display: grid; grid-template-columns: 1fr 340px; gap: 18px; }

  /* ── Dept headcount ── */
  .dept-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .dept-row:last-child { border-bottom: none; padding-bottom: 0; }
  .dept-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dept-name { font-size: 13px; color: var(--text-1); font-weight: 500; flex: 1; min-width: 0; }
  .dept-count { font-size: 13px; color: var(--text-2); font-variant-numeric: tabular-nums; width: 32px; text-align: right; }
  .dept-bar-wrap { width: 100px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .dept-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

  /* ── Employee table ── */
  .emp-table { width: 100%; border-collapse: collapse; }
  .emp-table th {
    padding: 9px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .emp-table td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-1);
    vertical-align: middle;
  }
  .emp-table tr:last-child td { border-bottom: none; }
  .emp-table tr:hover td { background: var(--bg-hover); }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .emp-name-cell { display: flex; align-items: center; gap: 9px; }
  .emp-name      { font-weight: 500; }
  .emp-id        { font-size: 11px; color: var(--text-2); font-family: var(--mono); }

  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-active   { background: var(--teal-dim);   color: var(--teal); }
  .badge-inactive { background: var(--border);      color: var(--text-2); }
  .badge-leave    { background: var(--amber-dim);   color: var(--amber); }
  .badge-shift-a  { background: var(--blue-dim);    color: var(--blue); }
  .badge-shift-b  { background: var(--purple-dim);  color: var(--purple); }

  .hours-bar { display: flex; align-items: center; gap: 8px; }
  .hours-bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; min-width: 60px; }
  .hours-bar-fill  { height: 100%; background: var(--blue); border-radius: 2px; }

  /* ── Shift presence ── */
  .shift-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .shift-tile {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 14px;
  }
  .shift-dept   { font-size: 11px; font-weight: 500; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .shift-count  { font-size: 22px; font-weight: 600; color: var(--text-1); letter-spacing: -0.5px; line-height: 1; }
  .shift-label  { font-size: 11px; color: var(--text-2); margin-top: 3px; }

  /* ── Import panel ── */
  .import-zone {
    border: 1.5px dashed var(--border-hi);
    border-radius: var(--radius-md);
    padding: 22px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .import-zone:hover { border-color: var(--blue); background: var(--blue-dim); }
  .import-zone.drag-over { border-color: var(--blue); background: var(--blue-dim); }
  .import-icon { font-size: 24px; margin-bottom: 8px; opacity: 0.6; }
  .import-text  { font-size: 13px; color: var(--text-2); }
  .import-text span { color: var(--blue); font-weight: 500; }

  .import-history { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .import-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
  }
  .import-row-name { color: var(--text-1); flex: 1; font-family: var(--mono); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .import-row-meta { color: var(--text-2); flex-shrink: 0; }
  .badge-ok   { background: var(--teal-dim);  color: var(--teal);  padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-warn { background: var(--amber-dim); color: var(--amber); padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-fail { background: var(--red-dim);   color: var(--red);   padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; }

  /* ── Donut ── */
  .donut-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto; }
  .donut-label {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .donut-pct  { font-size: 20px; font-weight: 600; color: var(--text-1); letter-spacing: -0.5px; }
  .donut-sub  { font-size: 11px; color: var(--text-2); }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-select {
    padding: 6px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-1);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  .filter-select:focus { border-color: var(--blue); }
  .search-input {
    padding: 6px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-1);
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    width: 180px;
  }
  .search-input::placeholder { color: var(--text-3); }
  .search-input:focus { border-color: var(--blue); }

  canvas { max-width: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Mock data (replace with Supabase queries) ─────────────────────────────────
const MOCK_EMPLOYEES = [
  { id:1, wasp_id:'E001', first_name:'Sarah',   last_name:'Jenkins',   department:'Dyeing',      job_title:'Lead Dyer',         pay_rate:22.50, status:'active',   shift:'SHIFT A', hours_this_week:38.5, is_clocked_in:true  },
  { id:2, wasp_id:'E002', first_name:'Marcus',  last_name:'Tsoi',      department:'Shipping',    job_title:'Shipping Lead',     pay_rate:20.00, status:'active',   shift:'SHIFT B', hours_this_week:40.0, is_clocked_in:true  },
  { id:3, wasp_id:'E003', first_name:'Elena',   last_name:'Rodriguez', department:'Finishing',   job_title:'Finisher',          pay_rate:18.75, status:'active',   shift:'SHIFT A', hours_this_week:35.0, is_clocked_in:false },
  { id:4, wasp_id:'E004', first_name:'James',   last_name:'Park',      department:'Maintenance', job_title:'Technician',        pay_rate:25.00, status:'active',   shift:'SHIFT A', hours_this_week:40.0, is_clocked_in:true  },
  { id:5, wasp_id:'E005', first_name:'Priya',   last_name:'Nair',      department:'Office',      job_title:'Office Coordinator',pay_rate:21.00, status:'active',   shift:'SHIFT A', hours_this_week:40.0, is_clocked_in:false },
  { id:6, wasp_id:'E006', first_name:'Carlos',  last_name:'Mendez',    department:'Dyeing',      job_title:'Dyer',              pay_rate:19.50, status:'active',   shift:'SHIFT B', hours_this_week:32.0, is_clocked_in:false },
  { id:7, wasp_id:'E007', first_name:'Aisha',   last_name:'Williams',  department:'Shipping',    job_title:'Packer',            pay_rate:17.00, status:'on_leave', shift:'SHIFT A', hours_this_week:0,    is_clocked_in:false },
  { id:8, wasp_id:'E008', first_name:'Tom',     last_name:'Chen',      department:'Finishing',   job_title:'Senior Finisher',   pay_rate:22.00, status:'active',   shift:'SHIFT B', hours_this_week:38.0, is_clocked_in:true  },
];

const MOCK_IMPORTS = [
  { id:1, file_name:'wasp_payroll_2025_w12.csv', imported_at:'2025-03-21 09:14', total_employees:8, total_hours:263.5, status:'completed' },
  { id:2, file_name:'wasp_payroll_2025_w11.csv', imported_at:'2025-03-14 08:52', total_employees:8, total_hours:278.0, status:'completed' },
  { id:3, file_name:'wasp_payroll_2025_w10.csv', imported_at:'2025-03-07 09:03', total_employees:8, total_hours:241.5, status:'partial'   },
];

const DEPT_COLORS = {
  Dyeing:      '#388bfd',
  Shipping:    '#39d353',
  Finishing:   '#a371f7',
  Office:      '#d29922',
  Maintenance: '#f78166',
};

const AVATAR_COLORS = ['#388bfd','#39d353','#a371f7','#d29922','#f78166','#4ac6b7','#e06c75','#61afef'];

function initials(f, l) { return (f[0] + (l[0] || '')).toUpperCase(); }

// ── Donut chart (canvas) ──────────────────────────────────────────────────────
function DonutChart({ pct, color, label }) {
  const ref = useRef();
  useEffect(() => {
    const ctx = ref.current.getContext('2d');
    const chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [pct, 100 - pct],
          backgroundColor: [color, 'rgba(99,130,168,0.12)'],
          borderWidth: 0,
          borderRadius: 4,
        }]
      },
      options: {
        cutout: '72%',
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        animation: { duration: 800, easing: 'easeInOutQuart' },
      }
    });
    return () => chart.destroy();
  }, [pct, color]);
  return (
    <div className="donut-wrap">
      <canvas ref={ref} width="110" height="110"/>
      <div className="donut-label">
        <span className="donut-pct">{pct}%</span>
        <span className="donut-sub">{label}</span>
      </div>
    </div>
  );
}

// ── Bar chart for dept headcount ──────────────────────────────────────────────
function HeadcountChart({ depts }) {
  const ref = useRef();
  useEffect(() => {
    const ctx = ref.current.getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: depts.map(d => d.name),
        datasets: [{
          data: depts.map(d => d.count),
          backgroundColor: depts.map(d => DEPT_COLORS[d.name] + '33'),
          borderColor:     depts.map(d => DEPT_COLORS[d.name]),
          borderWidth: 1.5,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          backgroundColor: '#1c2230',
          borderColor: 'rgba(99,130,168,0.2)',
          borderWidth: 1,
          titleColor: '#e6edf3',
          bodyColor: '#8b949e',
          padding: 10,
        }},
        scales: {
          x: { grid: { color: 'rgba(99,130,168,0.08)' }, ticks: { color: '#8b949e', font: { size: 11 } } },
          y: { grid: { color: 'rgba(99,130,168,0.08)' }, ticks: { color: '#8b949e', font: { size: 11 }, stepSize: 1 }, beginAtZero: true },
        },
      }
    });
    return () => chart.destroy();
  }, []);
  return <canvas ref={ref} style={{ width: '100%', height: '160px' }}/>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [employees, setEmployees]   = useState(MOCK_EMPLOYEES);
  const [filterDept, setFilterDept] = useState('All');
  const [filterStatus, setStatus]   = useState('All');
  const [search, setSearch]         = useState('');
  const [dragOver, setDragOver]     = useState(false);
  const [importing, setImporting]   = useState(false);
  const [importMsg, setImportMsg]   = useState(null);
  const fileRef = useRef();

  // Derived stats
  const active      = employees.filter(e => e.status === 'active').length;
  const clockedIn   = employees.filter(e => e.is_clocked_in).length;
  const floorPct    = Math.round((clockedIn / active) * 100);
  const totalHrsWk  = employees.reduce((s, e) => s + (e.hours_this_week || 0), 0);

  const depts = [...new Set(employees.map(e => e.department))].map(name => ({
    name,
    count:  employees.filter(e => e.department === name && e.status === 'active').length,
    active: employees.filter(e => e.department === name && e.is_clocked_in).length,
  }));

  const maxCount = Math.max(...depts.map(d => d.count), 1);

  // Filter
  const filtered = employees.filter(e => {
    const deptOk   = filterDept === 'All' || e.department === filterDept;
    const statOk   = filterStatus === 'All' || e.status === filterStatus;
    const searchOk = search === '' || `${e.first_name} ${e.last_name} ${e.wasp_id}`.toLowerCase().includes(search.toLowerCase());
    return deptOk && statOk && searchOk;
  });

  // Shift tiles — clocked in by dept
  const shiftTiles = depts.map(d => ({
    dept:  d.name,
    in:    d.active,
    total: d.count,
  }));

  // File upload handler
  const handleFile = useCallback((file) => {
    if (!file || !file.name.endsWith('.csv')) {
      setImportMsg({ type:'error', text: 'Please select a .csv file from Wasp payroll.' });
      return;
    }
    setImporting(true);
    setImportMsg(null);
    // Simulate upload → in production: POST to Supabase Storage then trigger Edge Function
    setTimeout(() => {
      setImporting(false);
      setImportMsg({ type:'success', text: `Imported ${file.name} — 8 employees, 263.5 hrs processed.` });
    }, 2200);
  }, []);

  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files[0];
    handleFile(file);
  };

  return (
    <div style={{ display:'flex', flex:1 }}>
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-logo">OpsMaster</div>
        <nav className="sidebar-nav">
          {['Master Dash','Order/Production','Energy Dashboard','Shipping','Employee Tracking','Cost Structure'].map(item => (
            <div key={item} className={`nav-item ${item === 'Employee Tracking' ? 'active' : ''}`}>{item}</div>
          ))}
        </nav>
      </aside>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <div>
            <div className="page-title">Employee Tracking</div>
            <div className="page-sub">Live headcount, shifts, and Wasp payroll data</div>
          </div>
          <div className="topbar-actions">
            <button className="btn" onClick={() => fileRef.current.click()}>
              ↑ Import CSV
            </button>
            <button className="btn btn-primary">Export</button>
            <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}}
              onChange={e => handleFile(e.target.files[0])}/>
          </div>
        </div>

        <div className="content">

          {/* KPI row */}
          <div className="kpi-grid">
            <div className="kpi-card blue">
              <div className="kpi-icon blue">👥</div>
              <div className="kpi-label">Active employees</div>
              <div className="kpi-value">{active}</div>
              <div className="kpi-sub">Current headcount</div>
            </div>
            <div className="kpi-card teal">
              <div className="kpi-icon teal">✓</div>
              <div className="kpi-label">Clocked in now</div>
              <div className="kpi-value">{clockedIn}</div>
              <div className="kpi-sub">On the floor today</div>
            </div>
            <div className="kpi-card amber">
              <div className="kpi-icon amber">⏱</div>
              <div className="kpi-label">Hours this week</div>
              <div className="kpi-value">{totalHrsWk.toFixed(0)}</div>
              <div className="kpi-sub">Across all departments</div>
            </div>
            <div className="kpi-card purple">
              <div className="kpi-icon purple">📋</div>
              <div className="kpi-label">On leave</div>
              <div className="kpi-value">{employees.filter(e=>e.status==='on_leave').length}</div>
              <div className="kpi-sub">Currently away</div>
            </div>
          </div>

          {/* Middle row */}
          <div className="two-col">

            {/* Left: headcount by dept + bar chart */}
            <div className="card">
              <div className="card-header">
                <span className="card-title">Headcount by department</span>
              </div>
              <div className="card-body">
                <HeadcountChart depts={depts}/>
                <div style={{marginTop:16}}>
                  {depts.map(d => (
                    <div className="dept-row" key={d.name}>
                      <div className="dept-dot" style={{background: DEPT_COLORS[d.name]}}/>
                      <div className="dept-name">{d.name}</div>
                      <div className="dept-bar-wrap">
                        <div className="dept-bar-fill" style={{width: `${(d.count/maxCount)*100}%`, background: DEPT_COLORS[d.name]}}/>
                      </div>
                      <div className="dept-count">{d.count}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Right: floor presence + shift tiles + import */}
            <div style={{display:'flex', flexDirection:'column', gap:14}}>

              {/* Floor presence donut */}
              <div className="card">
                <div className="card-header"><span className="card-title">Factory floor presence</span></div>
                <div className="card-body" style={{display:'flex', alignItems:'center', gap:20}}>
                  <DonutChart pct={floorPct} color="#388bfd" label="present"/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12, color:'var(--text-2)', marginBottom:8}}>Shift distribution</div>
                    {['SHIFT A','SHIFT B'].map(sh => {
                      const cnt = employees.filter(e => e.shift === sh && e.is_clocked_in).length;
                      const tot = employees.filter(e => e.shift === sh).length;
                      return (
                        <div key={sh} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                          <span className={`badge ${sh==='SHIFT A'?'badge-shift-a':'badge-shift-b'}`}>{sh}</span>
                          <div className="hours-bar" style={{flex:1}}>
                            <div className="hours-bar-track">
                              <div className="hours-bar-fill" style={{width: tot ? `${(cnt/tot)*100}%`:0, background: sh==='SHIFT A'?'var(--blue)':'var(--purple)'}}/>
                            </div>
                          </div>
                          <span style={{fontSize:12,color:'var(--text-2)',width:28,textAlign:'right'}}>{cnt}/{tot}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* Dept shift tiles */}
              <div className="card">
                <div className="card-header"><span className="card-title">Clocked in by dept</span></div>
                <div className="card-body" style={{paddingTop:12}}>
                  <div className="shift-grid">
                    {shiftTiles.map(t => (
                      <div className="shift-tile" key={t.dept}>
                        <div className="shift-dept" style={{color: DEPT_COLORS[t.dept]}}>{t.dept}</div>
                        <div className="shift-count">{t.in}</div>
                        <div className="shift-label">of {t.total} active</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Wasp import panel */}
              <div className="card">
                <div className="card-header"><span className="card-title">Wasp payroll import</span></div>
                <div className="card-body" style={{paddingTop:12}}>
                  <div
                    className={`import-zone ${dragOver ? 'drag-over' : ''}`}
                    onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                    onDragLeave={() => setDragOver(false)}
                    onDrop={onDrop}
                    onClick={() => fileRef.current.click()}
                  >
                    <div className="import-icon">📂</div>
                    <div className="import-text">
                      {importing ? 'Importing...' : <><span>Browse</span> or drag CSV here</>}
                    </div>
                    <div style={{fontSize:11, color:'var(--text-3)', marginTop:4}}>
                      Wasp export format • Auto-maps to Supabase
                    </div>
                  </div>
                  {importMsg && (
                    <div style={{marginTop:10, padding:'8px 12px', borderRadius:6, fontSize:12,
                      background: importMsg.type==='success' ? 'var(--teal-dim)' : 'var(--red-dim)',
                      color: importMsg.type==='success' ? 'var(--teal)' : 'var(--red)',
                      border: `1px solid ${importMsg.type==='success' ? 'rgba(57,211,83,0.2)' : 'rgba(248,81,73,0.2)'}`,
                    }}>
                      {importMsg.text}
                    </div>
                  )}
                  <div className="import-history">
                    {MOCK_IMPORTS.map(imp => (
                      <div className="import-row" key={imp.id}>
                        <div className="import-row-name">{imp.file_name}</div>
                        <div className="import-row-meta">{imp.total_hours}h</div>
                        <span className={`badge-${imp.status==='completed'?'ok':imp.status==='partial'?'warn':'fail'}`}>
                          {imp.status}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Employee table */}
          <div className="card">
            <div className="card-header">
              <span className="card-title">All employees</span>
              <div className="filter-bar">
                <input className="search-input" placeholder="Search name or ID…"
                  value={search} onChange={e => setSearch(e.target.value)}/>
                <select className="filter-select" value={filterDept} onChange={e => setFilterDept(e.target.value)}>
                  <option value="All">All departments</option>
                  {['Dyeing','Shipping','Finishing','Office','Maintenance'].map(d => (
                    <option key={d} value={d}>{d}</option>
                  ))}
                </select>
                <select className="filter-select" value={filterStatus} onChange={e => setStatus(e.target.value)}>
                  <option value="All">All statuses</option>
                  <option value="active">Active</option>
                  <option value="on_leave">On leave</option>
                  <option value="inactive">Inactive</option>
                </select>
              </div>
            </div>
            <div style={{overflowX:'auto'}}>
              <table className="emp-table">
                <thead>
                  <tr>
                    <th>Employee</th>
                    <th>Department</th>
                    <th>Shift</th>
                    <th>Pay rate</th>
                    <th>Hours / week</th>
                    <th>Status</th>
                    <th>Floor</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((e, i) => (
                    <tr key={e.id}>
                      <td>
                        <div className="emp-name-cell">
                          <div className="avatar" style={{background: AVATAR_COLORS[i % AVATAR_COLORS.length]}}>
                            {initials(e.first_name, e.last_name)}
                          </div>
                          <div>
                            <div className="emp-name">{e.first_name} {e.last_name}</div>
                            <div className="emp-id">{e.wasp_id} · {e.job_title}</div>
                          </div>
                        </div>
                      </td>
                      <td>
                        <span style={{display:'flex',alignItems:'center',gap:6}}>
                          <span style={{width:7,height:7,borderRadius:'50%',background:DEPT_COLORS[e.department],flexShrink:0,display:'inline-block'}}/>
                          {e.department}
                        </span>
                      </td>
                      <td>
                        <span className={`badge ${e.shift==='SHIFT A'?'badge-shift-a':'badge-shift-b'}`}>{e.shift}</span>
                      </td>
                      <td style={{fontFamily:'var(--mono)',fontSize:12}}>${e.pay_rate.toFixed(2)}/hr</td>
                      <td>
                        <div className="hours-bar">
                          <div className="hours-bar-track">
                            <div className="hours-bar-fill" style={{width:`${Math.min((e.hours_this_week/40)*100,100)}%`}}/>
                          </div>
                          <span style={{fontSize:12,color:'var(--text-2)',width:36,flexShrink:0}}>{e.hours_this_week}h</span>
                        </div>
                      </td>
                      <td>
                        <span className={`badge badge-${e.status==='active'?'active':e.status==='on_leave'?'leave':'inactive'}`}>
                          {e.status === 'on_leave' ? 'On leave' : e.status.charAt(0).toUpperCase()+e.status.slice(1)}
                        </span>
                      </td>
                      <td>
                        <span style={{
                          display:'inline-block', width:8, height:8, borderRadius:'50%',
                          background: e.is_clocked_in ? 'var(--teal)' : 'var(--text-3)',
                          boxShadow: e.is_clocked_in ? '0 0 6px rgba(57,211,83,0.5)' : 'none',
                        }}/>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{padding:'10px 18px',fontSize:12,color:'var(--text-2)',borderTop:'1px solid var(--border)'}}>
                {filtered.length} of {employees.length} employees
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
